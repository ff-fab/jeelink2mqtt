# Build Edge Image — manually rebuild the "edge" Docker tag.
#
# The edge tag always reflects the current HEAD of main. Use this workflow
# to rebuild after base image security patches without cutting a release.

name: Build edge image

on:
  workflow_dispatch:

jobs:
  build-push:
    name: Build and push edge
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (cross-compilation for ARM)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ff-fab/jeelink2mqtt:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
